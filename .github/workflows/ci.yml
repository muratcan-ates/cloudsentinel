# CloudSentinel CI — every push and pull request must arrive suite-green.
# The fake LLM provider keeps the run deterministic and quota-free, exactly
# like the local `make test` path.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test suite
        run: pytest -q
        env:
          SENTINEL_FAKE_LLM: "1"
