# Render Blueprint — CloudSentinel (competition deployment, locked plan).
# Free web service; the disk is ephemeral by design: the schema rebuilds on
# every boot (seed-on-startup) and scans are request-triggered, so nothing
# depends on persistence between deploys. Keep the service awake with an
# external UptimeRobot monitor pointed at /health.
services:
  - type: web
    name: cloudsentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      # Deterministic fake provider until a GEMINI_API_KEY is configured in
      # the dashboard (billing-disabled project key; then set this to 0).
      - key: SENTINEL_FAKE_LLM
        value: "1"
      # Lights the "LIVE ON RENDER" banner on the dashboard edition line.
      - key: SENTINEL_ENV
        value: render
